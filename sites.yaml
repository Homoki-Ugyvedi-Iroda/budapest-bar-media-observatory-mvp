# Budapest Bar Media Observatory — Site Configuration
# Each site entry contains the URL to scrape, language code, short name, and full name.
# Per-site parsing selectors (css_selector, link_selector, etc.) to be filled during implementation.

sites:
  - url: https://www.adwokatura.pl/aktualnosci/
    language: pl
    short_name: NRA
    full_name: Naczelna Rada Adwokacka (Polish Bar Council)
    selectors: {}

  - url: https://kirp.pl/aktualnosci/
    language: pl
    short_name: KIRP
    full_name: Krajowa Izba Radców Prawnych (National Chamber of Legal Advisors)
    selectors: {}

  - url: https://www.cak.cz/aktuality
    language: cs
    short_name: ČAK
    full_name: Česká advokátní komora (Czech Bar Association)
    selectors: {}

  - url: https://www.sak.sk/web/sk/cms/news
    language: sk
    short_name: SAK
    full_name: Slovenská advokátska komora (Slovak Bar Association)
    selectors: {}

  - url: https://www.odv-zb.si/odvetniska-zbornica/objave/novice/
    language: sl
    short_name: OZS
    full_name: Odvetniška zbornica Slovenije (Bar Association of Slovenia)
    selectors: {}

  - url: https://www.hok-cba.hr/novosti/
    language: hr
    short_name: HOK
    full_name: Hrvatska odvjetnička komora (Croatian Bar Association)
    selectors: {}

  - url: https://www.unbr.ro/category/ultimele-stiri/
    language: ro
    short_name: UNBR
    full_name: Uniunea Națională a Barourilor din România (National Union of Romanian Bars)
    selectors: {}

  - url: https://www.oerak.at/aktuelles/aktuelles-archiv/
    language: de
    short_name: ÖRAK
    full_name: Österreichischer Rechtsanwaltskammertag (Austrian Bar Association)
    selectors: {}

  - url: https://www.vas.bg/bg/c/news
    language: bg
    short_name: ВАдС
    full_name: Висш адвокатски съвет (Supreme Bar Council of Bulgaria)
    selectors: {}

